<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Vehicular{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Opcional: FontAwesome para íconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🚗 Sistema Vehicular PRO</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/vehiculos/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/vehiculos/lista/">Vehículos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vehiculos/mantenimiento/registrar/">Mantenimiento</a></li>
                <li class="nav-item"><a class="nav-link" href="/vehiculos/siniestro/registrar/">Siniestro</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'exportar_excel' %}">📥 Excel</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>

<li class="nav-item"><a class="nav-link" href="/vehiculos/dashboard/">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="/vehiculos/lista/">Vehículos</a></li>
<li class="nav-item"><a class="nav-link" href="/vehiculos/registrar-mantenimiento/">Mantenimiento</a></li>
<li class="nav-item"><a class="nav-link" href="/vehiculos/registrar-siniestro/">Siniestro</a></li>
